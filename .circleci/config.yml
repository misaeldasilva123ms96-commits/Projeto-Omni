version: 2.1

# =============================================================================
# Omni Project — CircleCI Pipeline Configuration
#
# Languages:   JavaScript (Node 24), TypeScript, Python 3.11, Rust (stable)
# Package Mgmt: npm (root + frontend), pip, Cargo
# Tests:       Vitest (frontend), custom JS runner, pytest, cargo test
# Lint:        ESLint, Prettier, Black, Flake8, Pylint, Clippy, Rustfmt
# Build:       Vite (frontend), Cargo (Rust), Docker multi-stage
# =============================================================================

# ---------------------------------------------------------------------------
# Orbs — Reusable package configurations
# ---------------------------------------------------------------------------
orbs:
  node: circleci/node@7.2.1
  python: circleci/python@4.0.0
  rust: circleci/rust@1.8.0

# ---------------------------------------------------------------------------
# Executors
# ---------------------------------------------------------------------------
executors:
  omni-executor:
    docker:
      - image: cimg/base:2025.04
    resource_class: medium
  python-executor:
    docker:
      - image: cimg/python:3.11-node
    resource_class: medium
  docker-executor:
    docker:
      - image: cimg/base:2025.04
    resource_class: medium

commands:
  install-node:
    steps:
      - node/install:
          node-version: "24.14.1"

  install-root-npm:
    steps:
      - install-node
      - node/install-packages:
          pkg-manager: npm
          cache-version: v1-root
          override-ci-command: npm ci

  install-frontend-npm:
    steps:
      - install-node
      - node/install-packages:
          pkg-manager: npm
          cache-version: v1-frontend
          app-dir: frontend
          override-ci-command: npm ci

  install-python-deps:
    steps:
      - python/install-packages:
          cache-version: v1-python
          pkg-manager: pip
          pip-dependency-file: backend/python/requirements.txt

  setup-rust:
    steps:
      - rust/install
      - restore_cache:
          name: Restore Cargo registry cache
          keys:
            - cargo-registry-{{ checksum "backend/rust/Cargo.lock" }}
            - cargo-registry-
      - run:
          name: Rust version info
          command: rustc --version && cargo --version
      - save_cache:
          name: Save Cargo registry cache
          key: cargo-registry-{{ checksum "backend/rust/Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git

  notify-failure:
    steps:
      - run:
          name: Notify failure (placeholder)
          command: |
            echo "Pipeline failed - check build logs"

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  # -----------------------------------------------------------------------
  # Lint & Static Checks
  # -----------------------------------------------------------------------
  lint:
    executor: python-executor
    steps:
      - checkout
      - install-root-npm
      - install-python-deps
      - setup-rust

      - run:
          name: ESLint
          command: npx eslint --ext .js,.mjs,.ts,.tsx . || true
      - run:
          name: Prettier check
          command: npx prettier --check "**/*.{js,ts,tsx,json,md}" || true
      - run:
          name: Black check
          command: black --check . || true
      - run:
          name: Flake8
          command: flake8 || true
      - run:
          name: Pylint
          command: pylint backend/python || true
      - run:
          name: Rustfmt check
          working_directory: backend/rust
          command: cargo fmt --check || true
      - run:
          name: Clippy
          working_directory: backend/rust
          command: cargo clippy --all-targets --all-features -- -D warnings || true
      - notify-failure

  # -----------------------------------------------------------------------
  # JavaScript Runtime Tests
  # -----------------------------------------------------------------------
  node-tests:
    executor: omni-executor
    steps:
      - checkout
      - install-root-npm
      - run:
          name: JS runtime tests
          command: npm run test:js-runtime
      - notify-failure

  # -----------------------------------------------------------------------
  # Python Tests with Coverage
  # -----------------------------------------------------------------------
  python-tests:
    executor: python-executor
    steps:
      - checkout
      - install-python-deps
      - run:
          name: Install Python test dependencies
          command: |
            python -m pip install --upgrade pip
            if [ -s backend/python/requirements.txt ]; then
              pip install -r backend/python/requirements.txt
            fi
            pip install -U pytest pytest-cov hypothesis
      - run:
          name: Python tests (pytest + coverage)
          command: |
            python -m pytest -q \
              tests/contracts tests/integration \
              tests/runtime/control tests/runtime/language \
              tests/runtime/observability \
              tests/runtime/test_orchestrator_decomposition.py \
              tests/runtime/test_vault_readonly_access.py \
              tests/runtime/test_human_approval_gate.py \
              tests/runtime/test_autonomy_operating_model.py \
              tests/runtime/test_safe_command_execution_gate.py \
              tests/runtime/test_sandbox_command_runner.py \
              tests/runtime/test_autonomous_test_runner_loop.py \
              tests/runtime/test_autonomous_repair_planner.py \
              tests/runtime/test_scoped_patch_proposal_engine.py \
              tests/runtime/test_controlled_branch_patch_applier.py \
              tests/runtime/test_post_patch_validation_loop.py \
              tests/runtime/test_controlled_commit_gate.py \
              tests/runtime/test_controlled_commit_executor.py \
              tests/runtime/test_controlled_push_gate.py \
              tests/runtime/test_controlled_push_executor.py \
              tests/runtime/test_pr_creation_gate.py \
              tests/runtime/test_controlled_pr_creator.py \
              tests/runtime/test_ci_monitor_gate.py \
              tests/runtime/test_controlled_ci_monitor.py \
              --cov=brain --cov=backend/python/brain/runtime/sandbox --cov-config=.coveragerc \
              --cov-report=term-missing --cov-report=xml
      - notify-failure

  # -----------------------------------------------------------------------
  # Rust Tests
  # -----------------------------------------------------------------------
  rust-tests:
    executor: omni-executor
    steps:
      - checkout
      - setup-rust
      - run:
          name: Rust tests
          working_directory: backend/rust
          command: cargo test --locked --all
      - notify-failure

  # -----------------------------------------------------------------------
  # Frontend — Tests, Typecheck, Build
  # -----------------------------------------------------------------------
  frontend:
    executor: omni-executor
    steps:
      - checkout
      - install-root-npm
      - install-frontend-npm
      - run:
          name: Frontend tests (Vitest)
          working_directory: frontend
          command: npm test
      - run:
          name: Frontend typecheck
          working_directory: frontend
          command: npm run typecheck
      - run:
          name: Frontend build
          working_directory: frontend
          command: npm run build
      - persist_to_workspace:
          root: frontend/dist
          paths:
            - .
      - notify-failure

  # -----------------------------------------------------------------------
  # Security — Audit, Regression, Secret Scan
  # -----------------------------------------------------------------------
  security:
    executor: python-executor
    steps:
      - checkout
      - install-root-npm
      - run:
          name: npm audit
          command: npm audit --audit-level=moderate || true
      - run:
          name: Security regression suite
          command: npm run test:security || true
      - install-python-deps
      - run:
          name: pip audit
          command: |
            pip install pip-audit
            pip-audit --exit-code 1 || true
      - notify-failure

  # -----------------------------------------------------------------------
  # Docker Build Validation
  # -----------------------------------------------------------------------
  docker-build:
    executor: docker-executor
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build demo Docker image
          command: docker build -f Dockerfile.demo -t omni-demo:ci .
      - run:
          name: Validate docker-compose config
          command: docker-compose -f docker-compose.demo.yml config || true
      - notify-failure

  # -----------------------------------------------------------------------
  # Demo Readiness Validation
  # -----------------------------------------------------------------------
  validate:
    executor: omni-executor
    steps:
      - checkout
      - install-root-npm
      - run:
          name: Validate public demo readiness
          command: npm run validate:public-demo || true
      - run:
          name: Validate audit pack
          command: npm run validate:audit-pack || true
      - notify-failure

  # -----------------------------------------------------------------------
  # Secret Scan (Gitleaks)
  # -----------------------------------------------------------------------
  secret-scan:
    executor: omni-executor
    steps:
      - checkout
      - run:
          name: Install Gitleaks
          command: |
            GITLEAKS_VERSION=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
            wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -O /tmp/gitleaks.tar.gz
            tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
            sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
      - run:
          name: Run Gitleaks
          command: gitleaks detect --no-git --verbose || true

  # -----------------------------------------------------------------------
  # Health Check (Scheduled)
  # -----------------------------------------------------------------------
  health-check-run:
    executor: omni-executor
    steps:
      - checkout
      - install-root-npm
      - run:
          name: Runtime health check
          command: npm run health:node || true

# ---------------------------------------------------------------------------
# Workflows
# ---------------------------------------------------------------------------

workflows:
  version: 2

  # PR Workflow — Runs on all branches except main
  pr-workflow:
    jobs:
      - lint:
          filters:
            branches:
              ignore: main
      - node-tests:
          filters:
            branches:
              ignore: main
      - python-tests:
          filters:
            branches:
              ignore: main
      - rust-tests:
          filters:
            branches:
              ignore: main
      - frontend:
          filters:
            branches:
              ignore: main
      - security:
          filters:
            branches:
              ignore: main
      - docker-build:
          filters:
            branches:
              ignore: main
      - validate:
          filters:
            branches:
              ignore: main
      - secret-scan:
          filters:
            branches:
              ignore: main

  # Main Workflow — Runs on push to main (full suite + deploy)
  main-workflow:
    jobs:
      - lint:
          filters:
            branches:
              only: main
      - node-tests:
          filters:
            branches:
              only: main
      - python-tests:
          filters:
            branches:
              only: main
      - rust-tests:
          filters:
            branches:
              only: main
      - frontend:
          filters:
            branches:
              only: main
          post-steps:
            - run:
                name: Deploy frontend to Cloudflare Pages
                command: |
                  if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
                    npx wrangler pages deploy frontend/dist --project-name projeto-omni || true
                  else
                    echo "CLOUDFLARE_API_TOKEN not set - skipping deploy"
                  fi
      - security:
          filters:
            branches:
              only: main
      - docker-build:
          filters:
            branches:
              only: main
      - validate:
          filters:
            branches:
              only: main
      - secret-scan:
          filters:
            branches:
              only: main

  # Hourly Health Check
  health-check:
    triggers:
      - schedule:
          cron: "0 * * * *"
          filters:
            branches:
              only:
                - main
    jobs:
      - health-check-run
