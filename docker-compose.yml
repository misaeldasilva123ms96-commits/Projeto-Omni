services:
  python-brain:
    build:
      context: .
      dockerfile: backend/python/Dockerfile
    env_file:
      - .env
    working_dir: /app/backend/python
    environment:
      OMNI_PYTHON_MODE: service
    command: ["python", "brain_service.py"]
    restart: always
    ports:
      - "7010:7010"
    volumes:
      - python_memory:/app/backend/python/memory
      - python_transcripts:/app/backend/python/transcripts
      - python_sessions:/app/backend/python/brain/runtime/sessions
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7010/internal/brain/health')"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 5s
    networks:
      - omini_net

  node-runner:
    build:
      context: .
      dockerfile: js-runner/Dockerfile
    env_file:
      - .env
    working_dir: /app
    command: ["node", "js-runner/healthcheck.js", "--watch"]
    restart: always
    healthcheck:
      test: ["CMD", "node", "js-runner/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 5s
    networks:
      - omini_net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_API_URL:-http://localhost:3001}
    restart: always
    ports:
      - "4173:4173"
    depends_on:
      python-brain:
        condition: service_healthy
      node-runner:
        condition: service_healthy
    networks:
      - omini_net

networks:
  omini_net:
    driver: bridge

volumes:
  # Persist only the data directories that matter across restarts.
  python_memory:
  python_transcripts:
  python_sessions:
