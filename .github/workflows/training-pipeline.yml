name: Training Pipeline (omni-training)

on:
  push:
    paths:
      - 'omni-training/**'
  workflow_dispatch: {}

jobs:
  training-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: 3.11

      - name: Install training deps
        run: |
          python -m pip install --upgrade pip
          if [ -f omni-training/requirements.txt ]; then pip install -r omni-training/requirements.txt; fi
          python -m pip install pytest

      - name: Download optional smoke dataset
        continue-on-error: true
        run: |
          if [ -f omni-training/scripts/download_dataset.py ]; then
            python omni-training/scripts/download_dataset.py --dataset-key default_small
          else
            echo "No dataset download script; continuing without generated data."
          fi

      - name: Report optional filter step
        run: |
          if [ -f omni-training/scripts/filter_dataset.py ]; then
            echo "Filter step available"
          fi

      - name: Run training tests
        run: python -m pytest -q tests/training

      - name: Upload artifacts (if created)
        uses: actions/upload-artifact@v7
        with:
          name: omni-training-artifacts
          path: omni-training/data
          if-no-files-found: warn
