name: Omni Runtime CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "ci/**"
      - "audit/**"
      - "validation/**"
      - "runtime/**"
      - "security/**"
      - "docs/**"
      - "lab/**"
  workflow_dispatch:

jobs:
  runtime:
    name: Full runtime stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Install frontend dependencies for security tests
        working-directory: frontend
        run: npm ci

      - name: Install Python test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/python/requirements-test.txt

      - name: Check diff whitespace
        run: git diff --check

      - name: Validate canonical-only environment policy
        run: npm run validate:env-aliases

      - name: Run security regression suite
        run: npm run test:security

      - name: Run Node QueryEngine runtime tests
        run: npm run test:js-runtime

      - name: Run all canonical Python suites
        run: npm run test:python:all

      - name: Run runtime hardening and performance gates
        run: >-
          python -m pytest -q
          tests/runtime/test_metrics_collector.py
          tests/runtime/test_jsonl_retention.py
          tests/performance/test_jsonl_runtime_performance.py
          tests/e2e/test_runtime_hardening.py
          tests/fase10/test_task_service.py

      - name: Run Rust API tests
        working-directory: backend/rust
        run: cargo test
