name: Omni Runtime CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "ci/**"
      - "audit/**"
      - "validation/**"
      - "runtime/**"
      - "security/**"
      - "docs/**"
      - "lab/**"
  workflow_dispatch:

jobs:
  runtime:
    name: Full runtime stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Install frontend dependencies for security tests
        working-directory: frontend
        run: npm ci

      - name: Install Python test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov

      - name: Check diff whitespace
        run: git diff --check

      - name: Run security regression suite
        run: npm run test:security

      - name: Run Node QueryEngine runtime tests
        run: npm run test:js-runtime

      - name: Run Python runtime pytest suite
        run: npm run test:python:pytest

      - name: Run Rust API tests
        working-directory: backend/rust
        run: cargo test
