name: Pull Request Labeler

on:
  pull_request_target:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Label changed areas
    runs-on: ubuntu-latest

    steps:
      - name: Label pull request
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
