name: Docs Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCS_PAGES_ARTIFACT: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build-and-deploy-docs:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare docs
        run: |
          # The repository maintains docs/ - publish as-is.
          ls -la docs || true

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
          name: ${{ env.DOCS_PAGES_ARTIFACT }}

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: ${{ env.DOCS_PAGES_ARTIFACT }}
