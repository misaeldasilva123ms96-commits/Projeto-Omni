name: Omni Python CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  python:
    name: Python All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/python/requirements-test.txt

      - name: Run all canonical Python suites
        run: npm run test:python:all
