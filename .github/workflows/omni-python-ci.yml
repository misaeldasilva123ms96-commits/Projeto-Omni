name: Omni Python CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/python/**"
      - "tests/**"
      - "pyproject.toml"
      - "**/requirements*.txt"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  python:
    name: Python brain runtime
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov

      - name: Run Python runtime pytest suite
        run: npm run test:python:pytest
