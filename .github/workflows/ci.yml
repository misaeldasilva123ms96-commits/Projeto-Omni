name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Install Node dependencies
        run: npm ci

      - name: Install ESLint
        run: npm install --no-save eslint

      - name: Check Python formatting
        run: black --check backend/python

      - name: Lint Python
        run: flake8 backend/python --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint Node
        run: npx eslint src js-runner

      - name: Compile Python files
        run: python -m py_compile backend/python/main.py $(find backend/python/brain -name '*.py' -type f)

      - name: Basic runtime smoke test
        working-directory: backend/python
        run: |
          OUTPUT=$(python main.py "test")
          test -n "$OUTPUT"
