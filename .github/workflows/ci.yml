name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-js-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
        python-version: [3.11]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python (early)
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python deps (ensure pytest present)
        run: |
          python -m pip install --upgrade pip
          # Only install requirements if file exists and is non-empty
          if [ -s backend/python/requirements.txt ]; then
            pip install -r backend/python/requirements.txt
          fi
          pip install -U pytest pytest-cov hypothesis

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install root npm dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run JS runtime tests
        run: npm run test:node

      - name: Run Python tests (pytest) with coverage
        run: |
          python -m pytest -q tests/contracts tests/integration tests/runtime/control tests/runtime/language tests/runtime/observability tests/runtime/test_orchestrator_decomposition.py tests/runtime/test_vault_readonly_access.py tests/runtime/test_human_approval_gate.py tests/runtime/test_autonomy_operating_model.py tests/runtime/test_safe_command_execution_gate.py tests/runtime/test_sandbox_command_runner.py tests/runtime/test_autonomous_test_runner_loop.py tests/runtime/test_autonomous_repair_planner.py tests/runtime/test_scoped_patch_proposal_engine.py --cov=brain --cov=backend/python/brain/runtime/sandbox --cov-report=term

      - name: Validate frontend build
        working-directory: frontend
        run: |
          npm run build
          npm run typecheck || true

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Node audit
        run: |
          npm audit --audit-level=moderate || true

      - name: Run security/validation scripts (light)
        run: npm run validate:public-demo || true

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo tests
        working-directory: backend/rust
        run: cargo test --locked --all

      - name: Cargo audit
        run: |
          cargo install --locked cargo-audit || true
          cd backend/rust && cargo audit || true
