name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Bridge
        working-directory: backend/rust
        run: |
          cargo build --release

      - name: Run Rust tests
        working-directory: backend/rust
        run: |
          cargo test

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        env:
          VITE_OMNI_API_URL: http://127.0.0.1:3001
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: example-public-anon-key
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_OMNI_API_URL: http://127.0.0.1:3001
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: example-public-anon-key
        run: npm run build

      - name: Run expanded runtime test suite
        run: npm test

      - name: Install Python coverage tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov

      - name: Run critical runtime coverage suite
        run: npm run test:python:pytest
