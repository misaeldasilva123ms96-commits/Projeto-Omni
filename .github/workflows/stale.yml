name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If the issue is still relevant, please
            leave a comment to keep it open.
          stale-pr-message: |
            This PR has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. Please address review feedback or leave
            a comment to keep it open.
          close-issue-message: "Closing due to inactivity."
          close-pr-message: "Closing due to inactivity."
          days-before-stale: 60
          days-before-close: 14
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: never-stale,security,bug
          exempt-pr-labels: never-stale,security
          operations-per-run: 100
