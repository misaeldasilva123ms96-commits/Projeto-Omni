name: Manual Full Validation

on:
  workflow_dispatch:

jobs:
  full-validation:
    name: Manual pre-merge full validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Install frontend dependencies for security tests
        working-directory: frontend
        run: npm ci

      - name: Install Python test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/python/requirements-test.txt

      - name: Check diff whitespace
        run: git diff --check

      - name: Validate audit pack
        run: npm run validate:audit-pack

      - name: Validate public demo readiness
        run: npm run validate:public-demo

      - name: Run security regression suite
        run: npm run test:security

      - name: Run Node QueryEngine runtime tests
        run: npm run test:js-runtime

      - name: Run all canonical Python suites
        run: npm run test:python:all

      - name: Run Rust API tests
        working-directory: backend/rust
        run: cargo test

      - name: Build demo Docker image if present
        run: |
          if [ -f Dockerfile.demo ]; then
            docker build -f Dockerfile.demo .
          else
            echo "Dockerfile.demo not found; skipping demo image build."
          fi
