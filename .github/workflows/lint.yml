name: Lint & Static Checks

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  js-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: ESLint (advisory, root + frontend)
        run: |
          echo "ADVISORY ONLY: this audit is non-blocking by design."
          npx eslint --ext .js,.mjs,.ts,.tsx . || true
      - name: Prettier check (advisory)
        run: |
          echo "ADVISORY ONLY: this audit is non-blocking by design."
          npx prettier --check "**/*.{js,ts,tsx,json,md}" || true

  py-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 pylint
      - name: Black check (advisory)
        run: |
          echo "ADVISORY ONLY: this audit is non-blocking by design."
          black --check . || true
      - name: Flake8 (advisory)
        run: |
          echo "ADVISORY ONLY: this audit is non-blocking by design."
          flake8 || true
      - name: Pylint (advisory, select folders)
        run: |
          echo "ADVISORY ONLY: this audit is non-blocking by design."
          pylint backend/python || true

  rust-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run clippy
        working-directory: backend/rust
        run: cargo clippy --all-targets --all-features -- -D warnings
