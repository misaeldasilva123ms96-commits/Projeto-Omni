name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_OMNI_API_URL: ${{ secrets.VITE_OMNI_API_URL || 'https://projeto-omni.pages.dev' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL || 'https://projeto-omni.pages.dev' }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/Projeto-Omni/' }}
        run: npm run build

      - name: Determine artifact path
        id: set-artifact
        run: |
          if [ -d frontend/dist ]; then
            echo "path=frontend/dist" >> $GITHUB_OUTPUT
          elif [ -d frontend/build ]; then
            echo "path=frontend/build" >> $GITHUB_OUTPUT
          else
            echo "path=" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact for GitHub Pages
        if: ${{ steps.set-artifact.outputs.path != '' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.set-artifact.outputs.path }}

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  optional-wrangler-deploy:
    if: ${{ vars.CLOUDFLARE_PAGES_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          
      - name: Install deps
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend for Cloudflare Pages
        working-directory: frontend
        env:
          VITE_OMNI_API_URL: ${{ secrets.VITE_OMNI_API_URL || 'https://projeto-omni.pages.dev' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL || 'https://projeto-omni.pages.dev' }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/Projeto-Omni/' }}
        run: npm run build
        
      - name: Wrangler deploy (Cloudflare Pages, opt-in)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            npx wrangler pages deploy frontend/dist --project-name projeto-omni
          else
            echo "CLOUDFLARE_API_TOKEN not set - skipping deploy"
          fi
