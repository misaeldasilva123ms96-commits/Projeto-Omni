name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Determine artifact path
        id: set-artifact
        run: |
          if [ -d frontend/dist ]; then
            echo "path=frontend/dist" >> $GITHUB_OUTPUT
          elif [ -d frontend/build ]; then
            echo "path=frontend/build" >> $GITHUB_OUTPUT
          else
            echo "path=" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact for GitHub Pages
        if: ${{ steps.set-artifact.outputs.path != '' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.set-artifact.outputs.path }}

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  optional-wrangler-deploy:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: Install deps
        run: npm ci
      - name: Wrangler deploy (Cloudflare Workers)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler deploy || true
