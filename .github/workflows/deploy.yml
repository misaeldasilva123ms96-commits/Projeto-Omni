name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            # The VPS keeps the checked-out repository in ~/project.
            cd ~/project
            # Pull the latest main branch before rebuilding containers.
            git pull origin main
            # Recreate the stack so image and env changes are picked up safely.
            docker compose down
            docker compose up -d --build
            # Verify that containers are running and the Python entrypoint responds.
            docker compose ps
            docker compose exec -T python-brain python main.py "healthcheck" >/tmp/omini-health.txt
            test -s /tmp/omini-health.txt
