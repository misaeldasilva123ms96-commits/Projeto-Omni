name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build frontend (artifact)
        if: always()
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          body: |
            Automated release created by workflow for tag ${{ github.ref_name }}.
          draft: true
          files: frontend/dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
