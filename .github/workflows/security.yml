name: Security Checks

on:
  schedule:
    - cron: '0 3 * * 1' # weekly on Mondays UTC
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript, python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3

  dependency-and-audit:
    name: Dependency & Runtime Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Node audit (advisory)
        working-directory: ./
        run: |
          npm ci
          echo "ADVISORY ONLY: this audit is non-blocking by design."
          if ! npm audit --audit-level=moderate; then
            echo "npm audit reported findings or returned a non-zero exit code."
          fi

      - name: Python pip-audit (advisory)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          echo "ADVISORY ONLY: this audit is non-blocking by design."
          if ! pip-audit --exit-code 1; then
            echo "pip-audit reported findings or returned a non-zero exit code."
          fi

      - name: Cargo audit (advisory)
        run: |
          sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
          echo "ADVISORY ONLY: this audit is non-blocking by design."
          if ! cargo install --locked cargo-audit; then
            echo "cargo-audit installation failed; leaving this advisory audit non-blocking."
            exit 0
          fi
          cd backend/rust
          if ! cargo audit; then
            echo "cargo audit reported findings or returned a non-zero exit code."
          fi
