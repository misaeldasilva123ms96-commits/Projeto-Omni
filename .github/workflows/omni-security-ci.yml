name: Omni Security CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security-regression:
    name: Security and public-boundary regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Install frontend dependencies for security tests
        working-directory: frontend
        run: npm ci

      - name: Install Python test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov

      - name: Audit Node dependencies
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Run security regression suite
        run: npm run test:security

      - name: Run DevSkim
        uses: microsoft/DevSkim-Action@v1
        continue-on-error: true

  codeql:
    name: CodeQL JavaScript/TypeScript and Python
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
