# =============================================================================
# SEGURANÇA: Merge de PR é PROIBIDO
# - O merge manual é realizado exclusivamente pelo usuário após revisão.
# - Esta action NUNCA deve ter permissão para fazer merge.
# - A branch main é protegida por branch protection rules.
# =============================================================================

# =============================================================================
# SEGURANÇA: Main é PROTEGIDA
# - Nenhum workflow pode fazer push direto na main.
# - Todas as alterações passam por branch de trabalho -> PR -> revisão -> merge.
# - A branch main possui regras de proteção que impedem pushes diretos.
# =============================================================================

# =============================================================================
# SEGURANÇA: Secrets NÃO podem ser acessados
# - Esta action opera com GITHUB_TOKEN, que tem escopo limitado.
# - Secrets de ambiente (ex: ANTHROPIC_API_KEY) são injetados pelo GitHub
#   Actions e NUNCA são expostos em logs ou outputs.
# - O GITHUB_TOKEN não tem acesso a secrets do repositório.
# =============================================================================

name: Claude Code Action

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request:
    types: [opened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]

# PERMISSÕES — Princípio do Menor Privilégio
# Permitidas:  contents:write, pull-requests:write, issues:write, actions:read
# Proibidas:   administration:write, secrets:write, packages:write, workflows:write
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  claude-response:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Opcional: personalizar frase de gatilho (padrão: @claude)
          # trigger_phrase: "/claude"

          # Opcional: ativar por assignee em issues
          # assignee_trigger: "claude"

          # Opcional: ativar por label em issues
          # label_trigger: "claude"

          # Opcional: argumentos avançados para o Claude CLI
          # claude_args: |
          #   --max-turns 10
          #   --model claude-sonnet-4-20250514
