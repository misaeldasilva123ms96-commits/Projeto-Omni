name: Post-Merge Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Full validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/python/requirements-test.txt

      - name: Run Node tests
        run: npm run test:node

      - name: Run canonical Python suites with required coverage
        run: npm run test:python:coverage

      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: .tmp/python-coverage/coverage.xml
          if-no-files-found: warn

      - name: Run Rust tests
        working-directory: backend/rust
        run: cargo test --locked

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build
